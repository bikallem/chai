name: Unit Tests

on:
  push:
  pull_request:

jobs:
  moon-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Type check
        run: moon check --target js

      - name: Run unit tests
        run: moon test -v
