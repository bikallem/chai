<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch - Chai</title>
    <link rel="stylesheet" href="../examples.css">
</head>

<body style="padding-top: 60px">
    <div id="app"></div>
    <script type="module">
        import { wasmImportObject } from "../../_build/wasm-gc/release/build/examples/fetch/webapi.mjs";
        const wasmPath = "../../_build/wasm-gc/release/build/examples/fetch/fetch.wasm";
        const { instance } = await WebAssembly.instantiateStreaming(
            fetch(wasmPath),
            wasmImportObject,
            {
                builtins: ["js-string"],
                importedStringConstants: "_",
            }
        );
        instance.exports._start();
    </script>
</body>

</html>
