<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Chai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .todo-app {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        .todo-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid #eee;
        }

        .todo-header h1 {
            font-size: 28px;
            font-weight: 300;
            color: #c44;
            text-align: center;
            margin-bottom: 16px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .todo-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .todo-input:focus {
            border-color: #c44;
        }

        .add-btn {
            padding: 10px 20px;
            background: #c44;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .add-btn:hover {
            background: #a33;
        }

        .todo-list-section {
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .todo-item:hover {
            background: #fafafa;
        }

        .todo-label {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }

        .todo-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .todo-text {
            font-size: 14px;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #aaa;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .delete-btn:hover {
            color: #c44;
        }

        .todo-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #888;
        }

        .filters {
            display: flex;
            gap: 4px;
        }

        .filter-btn {
            background: none;
            border: 1px solid transparent;
            border-radius: 3px;
            padding: 2px 8px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
        }

        .filter-btn:hover {
            border-color: #ddd;
        }

        .filter-btn.active {
            border-color: #c44;
            color: #c44;
        }

        .clear-btn {
            background: none;
            border: none;
            font-size: 13px;
            color: #888;
            cursor: pointer;
        }

        .clear-btn:hover {
            color: #333;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { wasmImportObject } from "../../_build/wasm-gc/release/build/examples/todo/webapi.mjs";
        const wasmPath = "../../_build/wasm-gc/release/build/examples/todo/todo.wasm";
        const { instance } = await WebAssembly.instantiateStreaming(
            fetch(wasmPath),
            wasmImportObject,
            {
                builtins: ["js-string"],
                importedStringConstants: "_",
            }
        );
        instance.exports._start();
    </script>
</body>

</html>
