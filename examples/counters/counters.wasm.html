<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counters - Chai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .counters-app {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 24px;
            text-align: center;
        }

        .counters-app h1 {
            font-size: 28px;
            font-weight: 300;
            color: #c44;
            margin-bottom: 24px;
        }

        .counters {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .counter-wrapper {
            flex: 1;
        }

        .counter-wrapper h2 {
            font-size: 16px;
            font-weight: 500;
            color: #666;
            margin-bottom: 12px;
        }

        .counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .counter-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 18px;
            cursor: pointer;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover {
            background: #f0f0f0;
            border-color: #c44;
            color: #c44;
        }

        .counter-value {
            font-size: 24px;
            font-weight: 600;
            min-width: 48px;
        }

        .reset-btn {
            padding: 10px 24px;
            background: #c44;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: #a33;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { wasmImportObject } from "../../_build/wasm-gc/release/build/examples/counters/webapi.mjs";
        const wasmPath = "../../_build/wasm-gc/release/build/examples/counters/counters.wasm";
        const { instance } = await WebAssembly.instantiateStreaming(
            fetch(wasmPath),
            wasmImportObject,
            {
                builtins: ["js-string"],
                importedStringConstants: "_",
            }
        );
        instance.exports._start();
    </script>
</body>

</html>
