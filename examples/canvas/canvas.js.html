<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing Pad - Chai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .canvas-app {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .canvas-app h1 {
            font-size: 28px;
            font-weight: 300;
            color: #2a7ae2;
        }

        .draw-canvas {
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: crosshair;
            background: #fff;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .clear-btn {
            padding: 10px 24px;
            background: #2a7ae2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .clear-btn:hover {
            background: #1a5ab2;
        }

        .stroke-count {
            font-size: 13px;
            color: #888;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="../_build/js/release/build/canvas/canvas.js"></script>
</body>

</html>
