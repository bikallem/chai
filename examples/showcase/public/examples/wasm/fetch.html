<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch - Chai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }

        .fetch-app {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 480px;
            max-width: 100%;
            padding: 32px;
        }

        .fetch-app h1 {
            font-size: 24px;
            font-weight: 300;
            color: #2a7ae2;
            margin-bottom: 16px;
        }

        .fetch-app h2 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .post-id {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }

        .fetch-btn {
            padding: 10px 28px;
            background: #2a7ae2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .fetch-btn:hover {
            background: #1a5ab2;
        }

        .hint {
            font-size: 13px;
            color: #aaa;
        }

        .loading {
            color: #2a7ae2;
        }

        .body {
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        .error {
            color: #c44;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { wasmImportObject } from "./webapi.mjs";
        const { instance } = await WebAssembly.instantiateStreaming(
            fetch("./fetch.wasm"),
            wasmImportObject,
            {
                builtins: ["js-string"],
                importedStringConstants: "_",
            }
        );
        instance.exports._start();
    </script>
</body>

</html>
