<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch - Chai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }

        .clock-app {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
            padding: 32px;
            text-align: center;
        }

        .clock-app h1 {
            font-size: 24px;
            font-weight: 300;
            color: #c44;
            margin-bottom: 24px;
        }

        .display {
            font-size: 64px;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            margin-bottom: 28px;
            color: #222;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .control-btn {
            padding: 10px 28px;
            background: #c44;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            min-width: 90px;
        }

        .control-btn:hover {
            background: #a33;
        }

        .hint {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { wasmImportObject } from "./webapi.mjs";
        const { instance } = await WebAssembly.instantiateStreaming(
            fetch("./clock.wasm"),
            wasmImportObject,
            {
                builtins: ["js-string"],
                importedStringConstants: "_",
            }
        );
        instance.exports._start();
    </script>
</body>

</html>
