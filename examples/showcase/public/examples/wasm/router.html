<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Router - Chai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .app {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 24px;
        }

        .app h1 {
            font-size: 28px;
            font-weight: 300;
            color: #c44;
            text-align: center;
            margin-bottom: 16px;
        }

        .nav {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }

        .nav-link {
            padding: 6px 16px;
            border-radius: 4px;
            text-decoration: none;
            color: #555;
            background: #f0f0f0;
            font-size: 14px;
        }

        .nav-link:hover {
            background: #e0e0e0;
            color: #333;
        }

        .page {
            padding: 8px 0;
        }

        .page h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .page p {
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { wasmImportObject } from "./webapi.mjs";
        const { instance } = await WebAssembly.instantiateStreaming(
            fetch("./router.wasm"),
            wasmImportObject,
            {
                builtins: ["js-string"],
                importedStringConstants: "_",
            }
        );
        instance.exports._start();
    </script>
</body>

</html>
