<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chai Examples</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-stone-100 text-stone-800 h-screen flex flex-col">
  <header class="bg-white border-b border-stone-200 px-6 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-semibold tracking-tight">Chai</h1>
      <span class="text-stone-400 text-sm">TEA framework for MoonBit</span>
    </div>
    <a href="https://github.com/bikallem/chai" target="_blank" rel="noopener"
      class="text-sm text-stone-500 hover:text-stone-800 transition-colors">GitHub</a>
  </header>

  <div class="flex flex-1 min-h-0">
    <nav id="sidebar"
      class="w-56 shrink-0 bg-white border-r border-stone-200 py-4 px-3 flex flex-col gap-1 overflow-y-auto">
    </nav>

    <main class="flex-1 flex flex-col min-w-0">
      <div id="example-header" class="px-6 py-3 bg-white border-b border-stone-200 shrink-0">
        <h2 id="example-title" class="text-lg font-medium"></h2>
        <p id="example-desc" class="text-sm text-stone-500 mt-0.5"></p>
      </div>
      <div class="flex-1 min-h-0 p-4">
        <iframe id="example-frame" class="w-full h-full rounded-lg border border-stone-200 bg-white"></iframe>
      </div>
    </main>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
