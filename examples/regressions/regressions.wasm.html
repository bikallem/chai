<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regressions - Chai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f6f7fb;
            color: #2a2a2a;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .regressions-app {
            width: 100%;
            max-width: 760px;
            background: #fff;
            border: 1px solid #e7e9ef;
            border-radius: 8px;
            padding: 20px;
            display: grid;
            gap: 12px;
        }

        h1 {
            font-size: 26px;
            font-weight: 500;
        }

        h2 {
            font-size: 18px;
            margin-top: 12px;
        }

        .items {
            display: flex;
            gap: 8px;
            list-style: none;
        }

        .item {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #cfd5e3;
            background: #f0f3fa;
            min-width: 40px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #bcc4d6;
            background: #eef2fb;
            cursor: pointer;
        }

        .spa-link,
        .spa-link-blank {
            display: inline-block;
            width: fit-content;
            color: #145dd9;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="app">
        <p class="mount-placeholder">placeholder mount content</p>
    </div>
    <script type="module">
        import { wasmImportObject } from "../../_build/wasm-gc/release/build/examples/regressions/webapi.mjs";
        const wasmPath = "../../_build/wasm-gc/release/build/examples/regressions/regressions.wasm";
        const { instance } = await WebAssembly.instantiateStreaming(
            fetch(wasmPath),
            wasmImportObject,
            {
                builtins: ["js-string"],
                importedStringConstants: "_",
            }
        );
        instance.exports._start();
    </script>
</body>

</html>
